---
name: asreproast
category: credentials
description: >
  Find and AS-REP roast accounts with Kerberos pre-authentication disabled.
  Queries LDAP for accounts with DONT_REQUIRE_PREAUTH flag (UAC 0x400000),
  then sends raw AS-REQ without pre-auth data to KDC port 88.
  Extracts the encrypted timestamp from AS-REP for offline cracking.
  Uses wldap32.dll for LDAP and raw sockets via ws2_32.dll for Kerberos.

author: "operator"
version: "1.0.0"
created: "2025-01-15"
updated: "2025-03-20"

execution_type: bof
bof_file: asreproast.x64.o
entry_point: go
bof_arch: x64

compatibility:
  agent_min_version: "1.0.0"
  dotnet_min_version: "4.0"
  os:
    - windows_server_2012r2
    - windows_server_2016
    - windows_server_2019
    - windows_server_2022
    - windows_10
    - windows_11

arguments:
  - name: domain
    type: string
    required: false
    default: ""
    description: "Target domain FQDN. Empty = current domain."
    pack_type: z

  - name: user
    type: string
    required: false
    default: ""
    description: "Specific user to target. Empty = all DONT_REQUIRE_PREAUTH accounts."
    pack_type: z

  - name: dc
    type: string
    required: false
    default: ""
    description: "Domain controller to query. Empty = auto-discover."
    pack_type: z

  - name: format
    type: int
    required: false
    default: 0
    description: "Output format. 0 = hashcat (mode 18200), 1 = John."
    pack_type: i

output_format: raw
opsec_level: low
opsec_notes: >
  Uses standard LDAP queries and Kerberos AS-REQ.
  AS-REQ without pre-auth is normal protocol behavior.
  May trigger alerts if targeting many accounts in rapid succession.

timeout: 120
tags: [kerberos, asrep, credentials, roasting]
references:
  - https://attack.mitre.org/techniques/T1558/004/
mitre_attack_id: T1558.004
