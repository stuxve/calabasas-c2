---
name: dcsync
category: credentials
description: >
  Perform DCSync attack via MS-DRSR (DRSGetNCChanges) to replicate
  password hashes from a domain controller. Requires
  DS-Replication-Get-Changes and DS-Replication-Get-Changes-All rights.
  Connects to the DC DRSUAPI named pipe and uses the replication protocol.
  Does NOT use mimikatz — implements DRSR RPC directly.

author: "operator"
version: "1.0.0"

execution_type: bof
bof_file: dcsync.x64.o
entry_point: go
bof_arch: x64

compatibility:
  agent_min_version: "1.0.0"
  dotnet_min_version: "4.0"
  os:
    - windows_server_2012r2
    - windows_server_2016
    - windows_server_2019
    - windows_server_2022
    - windows_10
    - windows_11

arguments:
  - name: domain
    type: string
    required: false
    default: ""
    description: "Target domain FQDN."
    pack_type: z
  - name: user
    type: string
    required: false
    default: ""
    description: "Specific user to DCSync (DOMAIN\\user or user). Empty = krbtgt."
    pack_type: z
  - name: dc
    type: string
    required: false
    default: ""
    description: "Target DC hostname. Empty = auto-discover."
    pack_type: z
  - name: all
    type: int
    required: false
    default: 0
    description: "1 = dump all domain accounts. WARNING: very noisy."
    pack_type: i

output_format: raw
opsec_level: high
opsec_notes: >
  DCSync generates Windows Security Event 4662 (Directory Service Access)
  with specific object GUIDs. Heavily monitored by EDR/SIEM.
  Requires DA or equivalent replication rights.

timeout: 300
tags: [dcsync, credentials, replication, drsuapi, ntlm]
references:
  - https://attack.mitre.org/techniques/T1003/006/
mitre_attack_id: T1003.006
