---
name: dumplsass
category: credentials
description: >
  Dump LSASS process memory for credential extraction.
  Uses MiniDumpWriteDump to create an in-memory minidump
  (never writes to disk). The dump is sent back to the
  operator for offline parsing with pypykatz/mimikatz.
  Requires SeDebugPrivilege or SYSTEM.

author: "operator"
version: "1.0.0"

execution_type: bof
bof_file: dumplsass.x64.o
entry_point: go
bof_arch: x64

compatibility:
  agent_min_version: "1.0.0"
  dotnet_min_version: "4.0"
  os:
    - windows_server_2012r2
    - windows_server_2016
    - windows_server_2019
    - windows_server_2022
    - windows_10
    - windows_11

arguments:
  - name: pid
    type: int
    required: false
    default: 0
    description: "LSASS PID. 0 = auto-detect."
    pack_type: i

output_format: file
opsec_level: high
opsec_notes: >
  Opening LSASS with PROCESS_VM_READ triggers Sysmon Event 10.
  MiniDumpWriteDump is a well-known indicator.
  Consider using direct NtReadVirtualMemory for stealthier approach.
  Credential Guard on newer systems blocks LSASS credential access.

timeout: 120
tags: [lsass, credentials, dump, minidump]
references:
  - https://attack.mitre.org/techniques/T1003/001/
mitre_attack_id: T1003.001
