---
name: extracttickets
category: credentials
description: >
  Extract Kerberos tickets from the current logon session's ticket cache.
  Uses LsaCallAuthenticationPackage with KERB_RETRIEVE_TKT_REQUEST to
  enumerate and extract all cached TGTs and service tickets.
  Returns base64-encoded .kirbi blobs.
  Can target other logon sessions by LUID when running as SYSTEM.

author: "operator"
version: "1.0.0"

execution_type: bof
bof_file: extracttickets.x64.o
entry_point: go
bof_arch: x64

compatibility:
  agent_min_version: "1.0.0"
  dotnet_min_version: "4.0"
  os:
    - windows_server_2012r2
    - windows_server_2016
    - windows_server_2019
    - windows_server_2022
    - windows_10
    - windows_11

arguments:
  - name: luid
    type: string
    required: false
    default: ""
    description: "Target logon session LUID (hex). Empty = current session. Requires SYSTEM."
    pack_type: z
  - name: service
    type: string
    required: false
    default: ""
    description: "Filter by service name (e.g., krbtgt, cifs). Empty = all tickets."
    pack_type: z

output_format: raw
opsec_level: low
opsec_notes: >
  Reading own ticket cache is normal behavior.
  Accessing other LUIDs requires SYSTEM and may trigger alerts.

timeout: 60
tags: [kerberos, tickets, extraction, kirbi]
references:
  - https://attack.mitre.org/techniques/T1558/
mitre_attack_id: T1558
