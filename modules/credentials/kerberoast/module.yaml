---
name: kerberoast
category: credentials
description: >
  Kerberoast: request TGS tickets for accounts with SPNs and output
  hashes for offline cracking. Combines LDAP enumeration (wldap32.dll)
  with Kerberos SSPI (secur32.dll) to request service tickets.
  Outputs in hashcat or John format.

author: "operator"
version: "1.0.0"

execution_type: bof
bof_file: kerberoast.x64.o
entry_point: go
bof_arch: x64

compatibility:
  agent_min_version: "1.0.0"
  agent_max_version: "99.x"
  dotnet_min_version: "4.0"
  dotnet_max_version: "4.8.1"

arguments:
  - name: domain
    type: string
    pack_type: z
    required: false
    default: ""
    description: "Target domain FQDN. Empty = current domain."
    example: "corp.local"

  - name: spn
    type: string
    pack_type: z
    required: false
    default: ""
    description: "Specific SPN to target. Empty = all SPNs."
    example: "MSSQLSvc/db01.corp.local:1433"

  - name: format
    type: int
    pack_type: i
    required: false
    default: 1
    description: "Output format. 1 = hashcat, 0 = John."

  - name: server
    type: string
    pack_type: z
    required: false
    default: ""
    description: "Specific DC to query for SPN enumeration."

output_format: raw
opsec_level: medium
opsec_notes: >
  Generates Kerberos TGS requests for each SPN target.
  Multiple TGS requests in rapid succession from a single host may
  trigger detection rules (e.g., Sigma rule for Kerberoasting).
  Consider using --spn to target specific accounts.

timeout: 300
tags: [kerberos, kerberoast, credentials, spn, cracking]
references:
  - https://attack.mitre.org/techniques/T1558/003/
  - https://www.harmj0y.net/blog/powershell/kerberoasting-without-mimikatz/
mitre_attack_id: T1558.003
