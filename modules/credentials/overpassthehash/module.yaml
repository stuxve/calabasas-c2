---
name: overpassthehash
category: credentials
description: >
  Over-pass-the-hash: request a TGT using an NTLM hash or AES key
  instead of a plaintext password. Builds a raw AS-REQ with
  PA-ENC-TIMESTAMP encrypted using the supplied key.
  The resulting TGT is injected into the ticket cache via PTT.
  Uses ws2_32.dll for raw Kerberos and secur32.dll for ticket injection.

author: "operator"
version: "1.0.0"

execution_type: bof
bof_file: overpassthehash.x64.o
entry_point: go
bof_arch: x64

compatibility:
  agent_min_version: "1.0.0"
  dotnet_min_version: "4.0"
  os:
    - windows_server_2012r2
    - windows_server_2016
    - windows_server_2019
    - windows_server_2022
    - windows_10
    - windows_11

arguments:
  - name: domain
    type: string
    required: true
    description: "Target domain FQDN."
    pack_type: z
  - name: user
    type: string
    required: true
    description: "Target username."
    pack_type: z
  - name: hash
    type: string
    required: true
    description: "NTLM hash (32 hex chars) or AES256 key (64 hex chars)."
    pack_type: z
  - name: dc
    type: string
    required: false
    default: ""
    description: "DC hostname. Empty = auto-discover."
    pack_type: z
  - name: etype
    type: int
    required: false
    default: 23
    description: "Encryption type: 23=RC4(NTLM), 17=AES128, 18=AES256."
    pack_type: i

output_format: raw
opsec_level: medium
opsec_notes: >
  Generates a legitimate-looking AS-REQ. RC4 (etype 23) is increasingly
  flagged as anomalous on modern DCs that expect AES. Prefer etype 18
  (AES256) when you have the AES key.

timeout: 60
tags: [kerberos, overpass, pth, hash, tgt]
references:
  - https://attack.mitre.org/techniques/T1550/002/
mitre_attack_id: T1550.002
