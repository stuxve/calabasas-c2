---
name: ptt
category: credentials
description: >
  Pass-the-Ticket: inject a Kerberos ticket (.kirbi, base64) into the
  current logon session's ticket cache.
  Uses LsaCallAuthenticationPackage with KERB_SUBMIT_TKT_REQUEST.
  Can target arbitrary LUID when running as SYSTEM.

author: "operator"
version: "1.0.0"

execution_type: bof
bof_file: ptt.x64.o
entry_point: go
bof_arch: x64

compatibility:
  agent_min_version: "1.0.0"
  dotnet_min_version: "4.0"
  os:
    - windows_server_2012r2
    - windows_server_2016
    - windows_server_2019
    - windows_server_2022
    - windows_10
    - windows_11

arguments:
  - name: ticket
    type: string
    required: true
    description: "Base64-encoded .kirbi ticket blob."
    pack_type: z
  - name: luid
    type: string
    required: false
    default: ""
    description: "Target LUID (hex). Empty = current session. Requires SYSTEM."
    pack_type: z

output_format: raw
opsec_level: medium
opsec_notes: >
  Injecting tickets generates Event 4768/4769 usage patterns.
  Using a golden/silver ticket may be detected by PAC validation.

timeout: 30
tags: [kerberos, ptt, passtheticket, injection]
references:
  - https://attack.mitre.org/techniques/T1550/003/
mitre_attack_id: T1550.003
