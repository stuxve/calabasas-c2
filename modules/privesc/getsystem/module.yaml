---
name: getsystem
category: privesc
description: >
  Elevate to SYSTEM via token duplication from a running SYSTEM process.
  Enables SeDebugPrivilege, enumerates processes via NtQuerySystemInformation,
  finds a SYSTEM process (winlogon, services.exe, etc.), duplicates its token,
  and impersonates it on the current thread. No pipes, no services, no child
  processes — pure in-process token manipulation.

author: "operator"
version: "1.0.0"
created: "2025-07-14"
updated: "2025-07-14"

execution_type: bof
bof_file: getsystem.x64.o
entry_point: go
bof_arch: x64

compatibility:
  agent_min_version: "1.0.0"
  agent_max_version: "99.x"
  dotnet_min_version: "4.0"
  dotnet_max_version: "4.8.1"
  os:
    - windows_server_2008r2
    - windows_server_2012
    - windows_server_2012r2
    - windows_server_2016
    - windows_server_2019
    - windows_server_2022
    - windows_10
    - windows_11

arguments:
  - name: technique
    type: int
    required: false
    default: 0
    description: >
      Ignored (reserved for future use). Only token duplication is implemented.
    pack_type: i

output_format: raw

opsec_level: high
opsec_notes: >
  Enables SeDebugPrivilege and opens SYSTEM processes (winlogon, services.exe)
  to duplicate their token. May trigger EDR alerts for cross-process token
  access and privilege adjustment. No child processes, no pipes, no services
  created. Requires HIGH integrity (local admin).

tags: [system, privesc, token, impersonation, sedebug]

references:
  - https://attack.mitre.org/techniques/T1134/001/
  - https://attack.mitre.org/techniques/T1134/002/
mitre_attack_id: T1134

timeout: 30
