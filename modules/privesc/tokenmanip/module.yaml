---
name: tokenmanip
category: privesc
description: >
  Token theft and impersonation. Enumerates tokens on running processes,
  steals a token by PID (OpenProcessToken + DuplicateTokenEx), and
  impersonates it (ImpersonateLoggedOnUser). Also supports reverting
  (RevertToSelf) and creating new tokens (LogonUserW).
  Does NOT spawn any child processes.

author: "operator"
version: "1.0.0"
created: "2025-07-14"
updated: "2025-07-14"

execution_type: bof
bof_file: tokenmanip.x64.o
entry_point: go
bof_arch: x64

compatibility:
  agent_min_version: "1.0.0"
  agent_max_version: "99.x"
  dotnet_min_version: "4.0"
  dotnet_max_version: "4.8.1"
  os:
    - windows_server_2008r2
    - windows_server_2012
    - windows_server_2012r2
    - windows_server_2016
    - windows_server_2019
    - windows_server_2022
    - windows_10
    - windows_11

arguments:
  - name: action
    type: enum
    required: true
    description: "Action: list, steal, impersonate, revert, make, whoami"
    example: "steal"
    pack_type: z
    enum_values: [list, steal, impersonate, revert, make, whoami]

  - name: pid
    type: int
    required: false
    default: 0
    description: "Target PID for steal/impersonate action"
    pack_type: i

  - name: username
    type: string
    required: false
    default: ""
    description: "Username for 'make' action (DOMAIN\\user format)"
    pack_type: z

  - name: password
    type: string
    required: false
    default: ""
    description: "Password for 'make' action"
    pack_type: z

output_format: raw

opsec_level: medium
opsec_notes: >
  Token operations use standard Win32 APIs (OpenProcessToken, DuplicateTokenEx,
  ImpersonateLoggedOnUser). These are normal API calls but opening other
  process tokens may trigger EDR detections. The 'make' action calls
  LogonUserW which generates a logon event (4624 type 9).
  The 'list' action uses NtQuerySystemInformation + OpenProcessToken
  which is noisy if targeting many processes.

tags: [token, impersonation, privilege, privesc, credentials]

references:
  - https://attack.mitre.org/techniques/T1134/001/
  - https://attack.mitre.org/techniques/T1134/002/
  - https://attack.mitre.org/techniques/T1134/003/
mitre_attack_id: T1134

timeout: 30
